spring:
  application:
    name: api-service

  datasource:
    url: jdbc:postgresql://localhost:5433/notix
    username: notix_user
    password: notix_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

info:
  app:
    name: api-service
    description: Handles notification submission & publishing
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

kafka:
  producer:
    topic: notifications
  consumer:
    status-topic: notifications.status

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

notix:
  defaults:
    tenant:
      name: NotiX Default Tenant
      domain: default.notix.local
    users:
      admin:
        username: admin
        email: admin@notix.local
        password: admin123
      operator:
        username: operator
        email: operator@notix.local
        password: operator123
  security:
    api-key: notix-secret-key
    bootstrap-admin-key: notix-bootstrap-admin-key
    jwt:
      secret: change-me-local-jwt-secret
      expiry-minutes: 120
