spring:
  application:
    name: retry-scheduler

  datasource:
    url: jdbc:postgresql://localhost:5433/notix
    username: notix_user
    password: notix_pass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: retry-scheduler-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

kafka:
  producer:
    email-topic: notifications.email
    sms-topic: notifications.sms

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:7070/eureka/
    healthcheck:
      enabled: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health
    metadata-map:
      swagger-ui: http://localhost:${server.port}/swagger-ui.html
      actuator-health: http://localhost:${server.port}/actuator/health
      openapi: http://localhost:${server.port}/v3/api-docs

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
